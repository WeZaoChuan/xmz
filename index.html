<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>择校宝典 2.0 专业版</title>
    <style>
        :root { --primary: #2563eb; --bg: #f3f4f6; --card-bg: #ffffff; }
        body { font-family: 'PingFang SC', sans-serif; background: var(--bg); margin: 0; color: #1f2937; }
        .hidden { display: none !important; }
        .header { position: sticky; top: 0; z-index: 100; background: #fff; padding: 1rem; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: center; }
        .back-btn { position: absolute; left: 1rem; color: var(--primary); cursor: pointer; font-weight: bold; }
        
        /* 搜索与容器 */
        .search-area { padding: 1.5rem; text-align: center; }
        .search-input { width: 90%; max-width: 500px; padding: 12px 25px; border-radius: 30px; border: 2px solid #d1d5db; outline: none; }
        .container { max-width: 800px; margin: 0 auto; padding: 1rem; }
        .school-card { background: #fff; border-radius: 12px; padding: 1.2rem; margin-bottom: 1rem; cursor: pointer; border: 1px solid #e5e7eb; }

        /* 主导航栏 (一级) */
        .main-nav { display: flex; background: #fff; border-bottom: 1px solid #e5e7eb; position: sticky; top: 57px; z-index: 99; }
        .nav-item { flex: 1; text-align: center; padding: 12px; font-size: 0.9rem; color: #6b7280; cursor: pointer; border-bottom: 3px solid transparent; }
        .nav-item.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: bold; }

        /* 子导航栏 (二级 - 仅在招生信息内显示) */
        .sub-nav { display: flex; gap: 10px; padding: 10px 1rem; background: #f9fafb; overflow-x: auto; border-bottom: 1px solid #e5e7eb; }
        .sub-item { padding: 6px 15px; background: #fff; border: 1px solid #d1d5db; border-radius: 20px; font-size: 0.8rem; white-space: nowrap; cursor: pointer; }
        .sub-item.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* 内容区 */
        .detail-content { padding: 1rem; background: #fff; min-height: 80vh; }
        .page-sec { display: none; }
        .page-sec.active { display: block; animation: fadeIn 0.2s; }
        
        /* 表格样式 */
        .table-wrapper { overflow-x: auto; margin: 1rem 0; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 500px; }
        td { border: 1px solid #e5e7eb; padding: 10px; text-align: center; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="listView">
        <div class="header"><h1>择校宝典 2.0</h1></div>
        <div class="search-area"><input type="text" class="search-input" id="search" placeholder="搜索学校..."></div>
        <div class="container" id="list"></div>
    </div>

    <div id="detailView" class="hidden">
        <div class="header"><span class="back-btn" onclick="goList()">← 返回</span><h1 id="title">详情</h1></div>
        
        <div class="main-nav">
            <div class="nav-item active" onclick="switchMain(0)">招生信息</div>
            <div class="nav-item" onclick="switchMain(1)">奖学金</div>
            <div class="nav-item" onclick="switchMain(2)">报考建议</div>
        </div>

        <div id="subBar" class="sub-nav">
            <div class="sub-item active" onclick="switchSub(0)">招生目录/科目</div>
            <div class="sub-item" onclick="switchSub(1)">成绩计算方法</div>
            <div class="sub-item" onclick="switchSub(2)">历年分数线</div>
        </div>

        <div class="detail-content">
            <div id="m-0-0" class="page-sec active"></div>
            <div id="m-0-1" class="page-sec"></div>
            <div id="m-0-2" class="page-sec"></div>
            <div id="m-1" class="page-sec"></div>
            <div id="m-2" class="page-sec"></div>
        </div>
    </div>

    <script>
        let db = [];
        fetch('data.json').then(r => r.json()).then(data => { db = data; render(data); });

        function render(data) {
            const list = document.getElementById('list');
            list.innerHTML = '';
            data.forEach(s => {
                const div = document.createElement('div');
                div.className = 'school-card';
                div.innerHTML = `<strong>${s.name}</strong><div style="font-size:0.8rem;color:#666;">${s.level} | ${s.location}</div>`;
                div.onclick = () => open(s);
                list.appendChild(div);
            });
        }

        function open(s) {
            document.getElementById('listView').classList.add('hidden');
            document.getElementById('detailView').classList.remove('hidden');
            document.getElementById('title').innerText = s.name;
            
            // 填充内容
            document.getElementById('m-0-0').innerHTML = s.admission_catalog || "暂无目录数据";
            document.getElementById('m-0-1').innerHTML = s.admission_score || "暂无计算方法数据";
            document.getElementById('m-0-2').innerHTML = s.admission_lines || "暂无分数线数据";
            document.getElementById('m-1').innerHTML = s.sec_scholarship || "暂无奖学金数据";
            document.getElementById('m-2').innerHTML = s.sec_advice || "暂无建议数据";
            
            switchMain(0);
        }

        function switchMain(idx) {
            document.querySelectorAll('.nav-item').forEach((n, i) => n.classList.toggle('active', i === idx));
            document.getElementById('subBar').classList.toggle('hidden', idx !== 0);
            
            // 隐藏所有，只显示选中的主模块
            document.querySelectorAll('.page-sec').forEach(p => p.classList.remove('active'));
            if(idx === 0) { switchSub(0); } 
            else { document.getElementById('m-' + idx).classList.add('active'); }
        }

        function switchSub(idx) {
            document.querySelectorAll('.sub-item').forEach((s, i) => s.classList.toggle('active', i === idx));
            document.querySelectorAll('[id^="m-0-"]').forEach(p => p.classList.remove('active'));
            document.getElementById('m-0-' + idx).classList.add('active');
        }

        function goList() { 
            document.getElementById('detailView').classList.add('hidden');
            document.getElementById('listView').classList.remove('hidden'); 
        }

        document.getElementById('search').oninput = (e) => {
            const kw = e.target.value.toLowerCase();
            render(db.filter(s => s.name.includes(kw) || s.location.includes(kw)));
        };
    </script>
</body>
</html>
