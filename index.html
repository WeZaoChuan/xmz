<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2027 通信电子考研择校宝典</title>
    <style>
        :root { --primary: #2563eb; --accent: #ef4444; --bg: #f1f5f9; --card-bg: #ffffff; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background-color: var(--bg); margin: 0; color: #1e293b; line-height: 1.6; }
        .navbar { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #e2e8f0; padding: 1rem; text-align: center; }
        .navbar h1 { font-size: 1.25rem; margin: 0; color: var(--primary); }
        .hero-section { padding: 1.5rem 1rem; text-align: center; }
        .search-input { width: 100%; max-width: 600px; padding: 15px 20px; border-radius: 50px; border: 2px solid #cbd5e1; font-size: 1rem; box-sizing: border-box; outline: none; }
        .search-input:focus { border-color: var(--primary); }
        .container { max-width: 800px; margin: 0 auto; padding: 1rem; }
        
        /* 院校卡片基础 */
        .school-card { background: var(--card-bg); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .school-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px dashed #e2e8f0; padding-bottom: 10px; margin-bottom: 10px; }
        .school-title { font-size: 1.25rem; font-weight: bold; color: #0f172a; }
        .tag-group { margin-bottom: 10px; }
        .tag { display: inline-block; font-size: 0.75rem; padding: 4px 8px; border-radius: 4px; margin-right: 5px; background: #e0f2fe; color: #0369a1; }
        
        /* 折叠按钮 */
        .toggle-btn { display: block; width: 100%; background: #f8fafc; color: var(--primary); border: 1px solid #e2e8f0; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .details-content { display: none; margin-top: 15px; }
        
        /* === 核心排版样式 === */
        .section-block { background: #fafafa; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .section-block h4 { margin: 0 0 10px 0; color: #1e40af; border-left: 4px solid var(--primary); padding-left: 10px; font-size: 1.1rem; }
        .sub-title { font-weight: bold; color: #334155; margin: 15px 0 8px 0; background: #f1f5f9; display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 0.95rem; }
        .section-block p { margin: 5px 0; font-size: 0.9rem; color: #475569; }
        
        /* 表格样式优化（带横向滚动） */
        .table-wrapper { width: 100%; overflow-x: auto; margin: 15px 0; border-radius: 6px; box-shadow: 0 0 0 1px #e2e8f0; }
        table { width: 100%; min-width: 600px; border-collapse: collapse; font-size: 0.85rem; background: #fff; text-align: center; }
        th { background: #f8fafc; padding: 10px; border: 1px solid #e2e8f0; color: #0f172a; }
        td { padding: 10px; border: 1px solid #e2e8f0; color: #334155; vertical-align: middle; }
    </style>
</head>
<body>
    <nav class="navbar"><h1>择校宝典 2.0 查询系统</h1></nav>
    <div class="hero-section">
        <input type="text" class="search-input" id="searchInput" placeholder="搜索院校、地区...">
    </div>
    <div class="container" id="listContainer"></div>

    <script>
        let schoolData = [];
        fetch('data.json').then(res => res.json()).then(data => {
            schoolData = data;
            renderList(schoolData);
        });

        function renderList(data) {
            const container = document.getElementById('listContainer');
            container.innerHTML = '';
            data.forEach((school, index) => {
                const card = document.createElement('div');
                card.className = 'school-card';
                
                // 拼接四大分类模块
                let detailsHtml = '';
                if(school.sec_admission) detailsHtml += `<div class="section-block">${school.sec_admission}</div>`;
                if(school.sec_scholarship) detailsHtml += `<div class="section-block">${school.sec_scholarship}</div>`;
                if(school.sec_advice) detailsHtml += `<div class="section-block">${school.sec_advice}</div>`;
                if(school.sec_contact) detailsHtml += `<div class="section-block">${school.sec_contact}</div>`;
                if(!detailsHtml) detailsHtml = "<div class='section-block'>暂无详细数据</div>";

                card.innerHTML = `
                    <div class="school-header">
                        <div class="school-title">${school.code} ${school.name}</div>
                        <div style="font-size:12px;color:#64748b;">难度: ${school.difficulty}</div>
                    </div>
                    <div class="tag-group">
                        <span class="tag">${school.level}</span>
                        <span class="tag">${school.location}</span>
                    </div>
                    <div style="font-size:13px;color:#666;margin-bottom:5px;">属性：${school.property}</div>
                    <div style="font-size:13px;color:#666;">排名：${school.rank}</div>
                    
                    <button class="toggle-btn" onclick="toggleDetails('details-${index}')">查看详尽报告 ↓</button>
                    <div class="details-content" id="details-${index}">${detailsHtml}</div>
                `;
                container.appendChild(card);
            });
        }

        window.toggleDetails = function(id) {
            const el = document.getElementById(id);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        };

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const kw = e.target.value.toLowerCase().trim();
            renderList(schoolData.filter(s => `${s.name} ${s.location} ${s.level}`.toLowerCase().includes(kw)));
        });
    </script>
</body>
</html>
